<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>History — Orizen Rx</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#06040f;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.1);
      --purple:#7c3aed;--cyan:#06b6d4;--text:#f1f5f9;--muted:#94a3b8;--emerald:#10b981}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none}
    .wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:40px 20px 80px}

    /* Header */
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:16px}
    .back-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:30px;
      background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);
      text-decoration:none;font-size:14px;font-weight:600;transition:.2s}
    .back-btn:hover{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4)}
    .page-title{font-size:clamp(1.8rem,4vw,2.5rem);font-weight:800;
      background:linear-gradient(135deg,#fff 0%,#a78bfa 50%,#06b6d4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .page-sub{color:var(--muted);font-size:14px;margin-top:4px}

    /* Stats summary */
    .summary{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
    .sum-card{flex:1;min-width:120px;padding:18px 20px;border-radius:16px;
      background:var(--glass);border:1px solid var(--border);text-align:center}
    .sum-val{font-size:28px;font-weight:800;
      background:linear-gradient(135deg,#a78bfa,#06b6d4);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sum-lbl{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500}

    /* Loading */
    #loading-state{text-align:center;padding:60px 0;color:var(--muted)}
    .spin{display:inline-block;width:40px;height:40px;border:3px solid rgba(124,58,237,.3);
      border-top-color:#7c3aed;border-radius:50%;animation:sp 1s linear infinite;margin-bottom:16px}
    @keyframes sp{to{transform:rotate(360deg)}}

    /* History list */
    #history-list{display:flex;flex-direction:column;gap:16px}

    .hist-card{padding:24px;border-radius:20px;background:var(--glass);
      border:1px solid var(--border);transition:.25s;position:relative;overflow:hidden}
    .hist-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,#7c3aed,#06b6d4)}
    .hist-card:hover{transform:translateY(-3px);border-color:rgba(124,58,237,.4);
      box-shadow:0 12px 40px rgba(124,58,237,.15)}

    .hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
    .hist-id{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .hist-date{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
    .hist-date::before{content:'🕐';font-size:11px}

    .meds-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .med-badge{padding:6px 14px;border-radius:30px;font-size:13px;font-weight:600;
      background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(6,182,212,.15));
      border:1px solid rgba(124,58,237,.3)}
    .med-use{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400;display:block}

    .hist-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
      border-top:1px solid var(--border);padding-top:14px;margin-top:4px}
    .video-count{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
    .video-count strong{color:var(--cyan);font-weight:700}

    /* Empty */
    .empty{text-align:center;padding:80px 20px;color:var(--muted)}
    .empty-icon{font-size:56px;margin-bottom:16px}
    .empty h3{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}

    @media(max-width:600px){.summary{gap:10px}.sum-card{padding:14px}}
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">

  <div class="top-bar">
    <div>
      <div class="page-title">📋 Prescription History</div>
      <div class="page-sub">All past AI analyses — newest first</div>
    </div>
    <a class="back-btn" href="/">← Back to Analyzer</a>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="sum-card"><div class="sum-val" id="total-count">0</div><div class="sum-lbl">Total Analyses</div></div>
    <div class="sum-card"><div class="sum-val" id="total-meds">0</div><div class="sum-lbl">Medications Found</div></div>
    <div class="sum-card"><div class="sum-val" id="total-videos">0</div><div class="sum-lbl">Videos Generated</div></div>
  </div>

  <div id="loading-state">
    <div class="spin"></div>
    <div>Loading history…</div>
  </div>

  <div id="history-list"></div>
</div>

<!-- Three.js Background (same as main page) -->
<script>
(function(){
  const canvas=document.getElementById('bg');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  const scene=new THREE.Scene(), camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
  camera.position.z=80;
  const count=150, pos=new Float32Array(count*3), col=new Float32Array(count*3);
  const pal=[new THREE.Color('#7c3aed'),new THREE.Color('#06b6d4'),new THREE.Color('#10b981')];
  for(let i=0;i<count;i++){pos[i*3]=(Math.random()-.5)*200;pos[i*3+1]=(Math.random()-.5)*200;pos[i*3+2]=(Math.random()-.5)*100;const c=pal[i%pal.length];col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:1.1,vertexColors:true,transparent:true,opacity:.7})));
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  (function loop(){requestAnimationFrame(loop);scene.rotation.y+=.0005;renderer.render(scene,camera);})();
})();
</script>

<script>
const API = 'http://localhost:8080/api/v1/prescription';

async function loadHistory() {
  try {
    const res  = await fetch(`${API}/history`);
    const data = await res.json();
    document.getElementById('loading-state').style.display = 'none';

    if (!data.length) {
      document.getElementById('history-list').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🗂️</div>
          <h3>No analyses yet</h3>
          <p>Upload a prescription to get started!</p>
          <a class="back-btn" href="/" style="display:inline-flex;margin-top:20px">Go to Analyzer →</a>
        </div>`;
      return;
    }

    // Summary stats
    const totalMeds   = data.reduce((s,i) => s + (i.medications?.length||0), 0);
    const totalVideos = data.reduce((s,i) => s + (i.videoCount||0), 0);
    document.getElementById('total-count').textContent  = data.length;
    document.getElementById('total-meds').textContent   = totalMeds;
    document.getElementById('total-videos').textContent = totalVideos;
    document.getElementById('summary').style.display    = 'flex';

    // Cards
    const list = document.getElementById('history-list');
    list.innerHTML = data.map(item => `
      <div class="hist-card">
        <div class="hist-header">
          <div class="hist-id">Analysis #${item.id}</div>
          <div class="hist-date">${esc(item.analyzedAt)}</div>
        </div>
        <div class="meds-row">
          ${(item.medications||[]).map(m => `
            <div>
              <div class="med-badge">💊 ${esc(m.name)}</div>
              ${m.use ? `<span class="med-use">${esc(m.use)}</span>` : ''}
            </div>`).join('')}
          ${!item.medications?.length ? `<span style="color:var(--muted);font-size:13px">No medications recorded</span>` : ''}
        </div>
        <div class="hist-footer">
          <div class="video-count">🎬 <strong>${item.videoCount}</strong> video${item.videoCount!==1?'s':''} generated</div>
        </div>
      </div>`).join('');

  } catch(e) {
    document.getElementById('loading-state').innerHTML =
      '<div style="color:#f87171">⚠️ Could not load history — make sure the backend is running.</div>';
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadHistory();
</script>
</body>
</html>
